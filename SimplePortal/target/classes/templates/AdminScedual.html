<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Admin – Schedules</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
        :root{--blue:#003366;--yellow:#FFD700;--light:#f4f7f6;--white:#fff;}
        body{background:var(--light);display:flex;min-height:100vh;}
        .sidebar{width:240px;background:var(--blue);color:var(--white);padding:25px;flex-shrink:0;}
        .sidebar h2{color:var(--yellow);font-size:1.3rem;margin-bottom:30px;border-bottom:2px solid var(--yellow);padding-bottom:10px;}
        .sidebar ul{list-style:none;}
        .sidebar ul li{margin-bottom:6px;}
        .sidebar ul li a{display:block;padding:11px 14px;border-radius:6px;color:var(--white);text-decoration:none;font-size:14px;transition:.2s;}
        .sidebar ul li a:hover,.sidebar ul li.active a{background:var(--yellow);color:var(--blue);font-weight:bold;}
        .main{flex:1;padding:35px;}
        .main h1{color:var(--blue);margin-bottom:20px;}
        .card{background:var(--white);border-radius:12px;padding:22px;box-shadow:0 4px 14px rgba(0,0,0,.07);margin-bottom:24px;}
        .card h3{color:var(--blue);margin-bottom:16px;}
        .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;align-items:end;}
        label{font-size:13px;font-weight:bold;color:var(--blue);display:block;margin-bottom:4px;}
        input,select{width:100%;padding:9px 11px;border:1px solid #ccc;border-radius:6px;font-size:13px;}
        input:focus,select:focus{border-color:var(--blue);outline:none;}
        .btn{padding:9px 20px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;font-size:13px;}
        .btn-add{background:var(--blue);color:var(--white);}
        .btn-add:hover{background:#002244;}
        .btn-del{background:#c0392b;color:#fff;padding:6px 14px;font-size:12px;}
        table{width:100%;border-collapse:collapse;}
        th{background:var(--blue);color:var(--yellow);padding:11px 13px;text-align:left;font-size:12px;text-transform:uppercase;}
        td{padding:11px 13px;border-bottom:1px solid #eee;font-size:13px;color:#444;}
        tr:hover td{background:#f9f9f9;}
        .alert-error{background:#fdecea;border:1px solid #f5c6cb;color:#721c24;padding:10px 14px;border-radius:6px;margin-bottom:14px;font-size:13px;}
        .empty{text-align:center;color:#aaa;font-style:italic;padding:20px;}
    </style>
</head>
<body>
<nav class="sidebar">
    <h2> Admin</h2>
    <ul>
        <li><a th:href="@{/admin/dashboard}">Dashboard</a></li>
        <li><a th:href="@{/admin/students}">Students</a></li>
        <li><a th:href="@{/admin/books}">Books</a></li>
        <li><a th:href="@{/admin/courses}">Store Courses</a></li>
        <li class="active"><a th:href="@{/admin/schedules}">Schedules</a></li>
        <li><a th:href="@{/admin/orders}">All Orders</a></li>
        <li><a th:href="@{/admin/history}">Full History</a></li>
        <li><a th:href="@{/logout}">Logout</a></li>
    </ul>
</nav>
<main class="main">
    <h1>Manage Schedules</h1>

    <div class="card">
        <h3>Assign Schedule Slot</h3>
        <div class="alert-error" th:if="${param.error != null}">Day and Course Name are required.</div>
        <form th:action="@{/admin/schedules/add}" method="post">
            <div class="form-grid">
                <div>
                    <label>Student *</label>
                    <select name="studentId" required>
                        <option value="">Select student</option>
                        <option th:each="s : ${students}" th:value="${s.id}"
                                th:text="${s.name + ' (#' + s.id + ')'}">Student</option>
                    </select>
                </div>
                <div>
                    <label>Day *</label>
                    <select name="day" required>
                        <option value="">Select day</option>
                        <option value="Sunday">Sunday</option>
                        <option value="Monday">Monday</option>
                        <option value="Tuesday">Tuesday</option>
                        <option value="Wednesday">Wednesday</option>
                        <option value="Thursday">Thursday</option>
                        <option value="Friday">Friday</option>
                        <option value="Saturday">Saturday</option>
                    </select>
                </div>
                <div>
                    <label>Time Slot</label>
                    <select name="timeSlot">
                        <option value="8:30 - 10:00">8:30 – 10:00</option>
                        <option value="10:30 - 12:00">10:30 – 12:00</option>
                        <option value="12:30 - 2:00">12:30 – 2:00</option>
                        <option value="2:30 - 4:00">2:30 – 4:00</option>
                    </select>
                </div>
                <div>
                    <label>Course Name *</label>
                    <input type="text" name="courseName" placeholder="e.g. Data Structures" required>
                </div>
                <div>
                    <label>Location</label>
                    <input type="text" name="location" placeholder="e.g. Hall A - B101">
                </div>
                <div style="align-self:end;">
                    <button class="btn btn-add" type="submit">+ Assign Slot</button>
                </div>
            </div>
        </form>
    </div>


    <div class="card">
        <h3>All Schedule Slots</h3>
        <table>
            <thead>
            <tr><th>#</th><th>Student</th><th>Day</th><th>Time</th><th>Course</th><th>Location</th><th>Action</th></tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(slots)}">
                <td colspan="7" class="empty">No schedule slots yet.</td>
            </tr>
            <tr th:each="sl,iter : ${slots}">
                <td th:text="${iter.index+1}">1</td>
                <td th:text="${sl.student.name}">-</td>
                <td th:text="${sl.day}">-</td>
                <td th:text="${sl.timeSlot}">-</td>
                <td th:text="${sl.courseName}">-</td>
                <td th:text="${sl.location}">-</td>
                <td>
                    <form th:action="@{/admin/schedules/delete}" method="post"
                          onsubmit="return confirm('Remove this slot?')">
                        <input type="hidden" name="id" th:value="${sl.id}">
                        <button class="btn btn-del" type="submit">Remove</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
