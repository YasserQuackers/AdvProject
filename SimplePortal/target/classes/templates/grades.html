<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>course</title>

    <style>    body {
        background-color: #0b1f3a;
        display: flex;
        flex-direction: column;
        align-items: center;   /* centers horizontally */
        justify-content: center; /* centers vertically */
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color: #f1c40f;
    }.table-container {
         width: 100%;
         max-width: 800px;
         margin: 0 auto; /* center horizontally */
     }

    .container {
        background-color: #112b52;
        padding: 30px;
        border-radius: 10px;
        max-width: 400px;
        width: 100%;
        display: flex;
        flex-direction: column;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        margin-bottom: 100px;
    }

    h4 {
        margin-top: 0;
        color: #f1c40f;
        font-size: 1.5rem;
        text-align: center;
    }

    label {
        color: #f1c40f;
        display: block;
        margin-bottom: 10px;
        font-weight: bold;
    }

    input[type="text"],
    select {
        width: 100%;
        padding: 12px;
        margin-bottom: 20px;
        border: 1px solid #f1c40f;
        border-radius: 5px;
        background-color: #ffffff;
        color: #0b1f3a;
        box-sizing: border-box;
        font-size: 14px;
    }

    /* Submit Button */
    button {
        background-color: #f1c40f; /* yellow */
        color: #0b1f3a; /* blue text */
        border: none;
        border-radius: 5px;
        padding: 15px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s ease;
    }

    button:hover {
        background-color: #d4ac0d; /* darker yellow */
    }

    table {
        width: 100%;
        max-width: 800px;
        border-collapse: collapse;
        background-color: #112b52;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    th, td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid #f1c40f;
        color: #f1c40f;
    }

    th {
        background-color: #0b1f3a;
        color: #f1c40f;
        text-transform: uppercase;
        font-size: 12px;
        letter-spacing: 1px;
    }

    tr:hover {
        background-color: #1b3b6f;
    }

    tr:last-child td {
        border-bottom: none;
    }
    </style>
</head>
<body>
<div th:replace="fragments/cookies :: cookieBanner"></div>
<div class="table-container">
    <h1>grade</h1>
    <div style="margin-bottom: 15px;">
        <a th:href="@{/dashboard}" style="color:#f1c40f; text-decoration:none; font-weight:bold;">Back to Dashboard</a>
        <span style="margin: 0 8px;">|</span>
        <a th:href="@{/gpa-calculator}" style="color:#f1c40f; text-decoration:none; font-weight:bold;">GPA Calculator</a>
    </div>
    <table>
        <thead>
        <tr>
            <th>Course Name</th>
            <th>Course Code</th>
            <th>Instructor</th>
            <th>Semester</th>
            <th>Grade</th>
            <th>Hours</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="course : ${courses}">
            <td th:text="${course.courseName}"></td>
            <td th:text="${course.courseCode}"></td>
            <td th:text="${course.instructor}"></td>
            <td th:text="${course.semester}"></td>
            <td th:text="${course.grade}"></td>
            <td th:text="${course.creditHours}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
